<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;background:#ffffff;}</style></head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif">
  <rect width="1200" height="630" fill="#ffffff"/>

  <text x="80" y="96" font-size="26" fill="#57606A">5 frontier models &#183; 410 coding-agent runs &#183; every one traced</text>
  <text x="80" y="150" font-size="40" font-weight="700" fill="#1F2328">All of them can code. That is not what separates them.</text>

  <!-- tile 1 -->
  <g>
    <rect x="80" y="210" width="330" height="290" rx="16" fill="#F6F8FA"/>
    <text x="110" y="330" font-size="88" font-weight="700" fill="#1F2328">100%</text>
    <text x="110" y="380" font-size="22" fill="#1F2328">solved by every model</text>
    <text x="110" y="410" font-size="22" fill="#1F2328">when it could run the tests</text>
  </g>

  <!-- tile 2 (accent) -->
  <g>
    <rect x="435" y="210" width="330" height="290" rx="16" fill="#0080FF"/>
    <text x="465" y="330" font-size="88" font-weight="700" fill="#ffffff">14x</text>
    <text x="465" y="380" font-size="22" fill="#ffffff">cost difference</text>
    <text x="465" y="410" font-size="22" fill="#ffffff">for identical outcomes</text>
  </g>

  <!-- tile 3 -->
  <g>
    <rect x="790" y="210" width="330" height="290" rx="16" fill="#F6F8FA"/>
    <text x="820" y="330" font-size="88" font-weight="700" fill="#1F2328">40%</text>
    <text x="820" y="380" font-size="22" fill="#1F2328">of requests refused</text>
    <text x="820" y="410" font-size="22" fill="#1F2328">by one model's safety layer</text>
  </g>

  <text x="80" y="566" font-size="22" fill="#8B949E">The benchmark, the tasks, and every trace are public.</text>
</svg>
</body>
</html>
